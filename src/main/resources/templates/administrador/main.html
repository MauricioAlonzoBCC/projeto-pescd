<h1>PAGINA DO ADMINISTRADOR</h1>

<form th:action="@{/administrador/alterarMensagem}" method="post">

    <label>Mensagem exibida ao secretário:</label>
    <br><br>

    <textarea
            name="texto"
            rows="4"
            cols="60"
            th:text="${mensagem}">
    </textarea>

    <br><br>

    <button type="submit">
        Salvar
    </button>

</form>
