<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
</head>

<body>

<h1>Login</h1>

<form th:action="@{/login}" method="post">

    <div>
        <label>Username:</label>
        <input type="text" name="username">
    </div>

    <div>
        <label th:text="#{login.senha}">Senha:</label>
        <input type="password" name="password">
    </div>

    <button type="submit" th:text="#{login.entrar}">
        Entrar
    </button>

</form>

<div th:if="${param.error}" th:text="#{login.erro}">
    Usuário ou senha inválidos.
</div>

<a th:href="@{/visitante}">
    <button type="button" th:text="#{login.visitante}">
        Acessar como visitante
    </button>
</a>

</body>
</html>
